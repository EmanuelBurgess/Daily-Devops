name: Daily DevOps Joke & Skill

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EST) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  generate-and-email:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google GenAI SDK
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Execute DevOps Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python daily-devops.py

    - name: Send Email via Gmail SMTP
      uses: dawidd6/action-send-mail@v4
      with:
        # Configuration for Google SMTP Server
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_APP_PASSWORD }}
        
        # Email Details
        subject: "☕ Your Daily DevOps Briefing"
        to: ${{ secrets.TO_EMAIL }}
        from: "DevOps Automations <${{ secrets.GMAIL_USERNAME }}>"
        
        # Direct file ingestion and rich rendering setup
        html_body: file://briefing.md
        convert_markdown: true
        content_type: text/html